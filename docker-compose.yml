services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: finmark-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "FinMark@1234"
    ports:
      - "1433:1433"
    volumes:
      - finmark-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -No -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql-tools:latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/config/setup.sql:/setup.sql:ro
    entrypoint: ["/opt/mssql-tools/bin/sqlcmd", "-S", "db", "-U", "sa", "-P", "FinMark@1234", "-i", "/setup.sql"]

volumes:
  finmark-db-data:
